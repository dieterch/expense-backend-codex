services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: file:/app/data/dev.db
    ports:
      - "5678:5678"
    volumes:
      - expense_data:/app/data

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://127.0.0.1:5678/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  expense_data:
