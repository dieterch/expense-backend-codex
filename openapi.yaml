openapi: 3.0.3
info:
  title: Expense Backend API
  version: 1.0.0
  description: |
    OpenAPI documentation for the Nitro + Prisma expense-sharing backend.
    
    Notes:
    - Authentication is handled by Bearer JWT middleware.
    - Local development can bypass bearer auth by setting `NITRO_DEV_AUTH_BYPASS=true`.
    - Versioned aliases are available under `/api/v1/*` and currently mirror the `/api/*` routes.
    - Some endpoints use POST for filtered reads (e.g. /api/tripexpenses, /api/tripusers).
servers:
  - url: http://localhost:5678
    description: Local development

tags:
  - name: Users
  - name: Trips
  - name: Expenses
  - name: Trip Queries
  - name: Categories
  - name: Currency
  - name: System

security:
  - BearerAuth: []

paths:
  /:
    get:
      tags: [System]
      summary: Root route
      description: Returns an access-prohibited message.
      responses:
        '200':
          description: Plain text response
          content:
            text/plain:
              schema:
                type: string
                example: access prohibited

  /api/auth/login:
    post:
      tags: [System]
      summary: Login and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: JWT login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/me:
    get:
      tags: [Users]
      summary: Return the authenticated user profile
      responses:
        '200':
          description: Current user profile and trip memberships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users:
    get:
      tags: [Users]
      summary: List users
      description: Requires admin privileges.
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: Create user
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateInput'
      responses:
        '200':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [Users]
      summary: Update user
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateInput'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Users]
      summary: Delete user
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: User deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/trips:
    get:
      tags: [Trips]
      summary: List trips
      description: Returns member trips for regular users and all trips for admins.
      responses:
        '200':
          description: Trips list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripWithUsersAndExpenses'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Trips]
      summary: Create trip
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripCreateInput'
      responses:
        '200':
          description: Created trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [Trips]
      summary: Update trip and its user assignments
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripUpdateInput'
      responses:
        '200':
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Trips]
      summary: Delete trip
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Trip deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/expenses:
    get:
      tags: [Expenses]
      summary: List expenses
      description: Returns trip-scoped expenses for regular users and all expenses for admins.
      responses:
        '200':
          description: Expenses list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseWithRelations'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Expenses]
      summary: Create expense
      description: Requires trip membership. Regular users may only create expenses for themselves.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseCreateInput'
      responses:
        '200':
          description: Created expense
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [Expenses]
      summary: Update expense
      description: Regular users may only update their own expenses within their trips.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseUpdateInput'
      responses:
        '200':
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Expenses]
      summary: Delete expense
      description: Regular users may only delete their own expenses within their trips.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Expense deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tripexpenses:
    post:
      tags: [Trip Queries]
      summary: List expenses for a specific trip
      description: Requires trip membership or admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripIdInput'
      responses:
        '200':
          description: Expenses for trip
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseWithRelations'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/tripusers:
    post:
      tags: [Trip Queries]
      summary: List users assigned to a specific trip
      description: Requires trip membership or admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripIdInput'
      responses:
        '200':
          description: Users for trip
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripUserSelection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/categories:
    get:
      tags: [Categories]
      summary: List categories
      responses:
        '200':
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryWithExpenses'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Categories]
      summary: Create category
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateInput'
      responses:
        '200':
          description: Created category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [Categories]
      summary: Update category
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateInput'
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Categories]
      summary: Delete category
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Category deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/currency:
    get:
      tags: [Currency]
      summary: List currencies
      responses:
        '200':
          description: Currency list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Currency'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Currency]
      summary: Create currency
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurrencyCreateInput'
      responses:
        '200':
          description: Created currency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Currency'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [Currency]
      summary: Update currency
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurrencyUpdateInput'
      responses:
        '200':
          description: Updated currency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Currency'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Currency]
      summary: Delete currency
      description: Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Currency deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested record was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with an existing record or unique constraint.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        statusMessage:
          type: string
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
        trips:
          type: array
          items:
            type: object
            additionalProperties: true
        expenses:
          type: array
          items:
            type: object
            additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserCreateInput:
      type: object
      required: [email, name, password, role]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
        role:
          type: string

    UserUpdateInput:
      allOf:
        - $ref: '#/components/schemas/UserCreateInput'
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          type: object
          required: [id, email, name, role]
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            name:
              type: string
            role:
              type: string

    CurrentUser:
      type: object
      required: [id, email, name, role, trips]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
        trips:
          type: array
          items:
            type: object
            required: [id, name, startDate]
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              startDate:
                type: string
                format: date-time
              endDate:
                type: string
                format: date-time
                nullable: true

    Trip:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TripUserInput:
      type: object
      required: [userId, tripId]
      properties:
        userId:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid

    TripCreateInput:
      type: object
      required: [name, startDate]
      properties:
        name:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true

    TripUpdateInput:
      type: object
      required: [id, name, startDate, users]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startDate:
          type: string
          format: date-time
        users:
          type: array
          items:
            $ref: '#/components/schemas/TripUserInput'

    UserBasic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email

    TripUserSelection:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserBasic'

    TripWithUsersAndExpenses:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startDate:
          type: string
          format: date-time
        users:
          type: array
          items:
            $ref: '#/components/schemas/TripUserSelection'
        expenses:
          type: array
          items:
            type: object
            additionalProperties: true

    Expense:
      type: object
      required: [amount, currency, date, location, tripId, userId, categoryId]
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          format: float
        amountCents:
          type: integer
          description: Integer minor-unit amount derived from `amount` for safer money handling.
        currency:
          type: string
        date:
          type: string
          format: date-time
        location:
          type: string
        description:
          type: string
          nullable: true
        tripId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ExpenseCreateInput:
      type: object
      required: [amount, currency, date, location, tripId, userId, categoryId]
      properties:
        amount:
          type: number
          format: float
        amountCents:
          type: integer
          description: Optional future-facing field; the server currently derives this from `amount`.
        currency:
          type: string
          description: Must match Currency.name
        date:
          type: string
          format: date-time
        location:
          type: string
        description:
          type: string
          nullable: true
        tripId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid

    ExpenseUpdateInput:
      allOf:
        - $ref: '#/components/schemas/ExpenseCreateInput'
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid

    ExpenseWithRelations:
      allOf:
        - $ref: '#/components/schemas/Expense'
        - type: object
          properties:
            trip:
              $ref: '#/components/schemas/Trip'
            user:
              $ref: '#/components/schemas/UserBasic'
            category:
              $ref: '#/components/schemas/Category'

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CategoryCreateInput:
      type: object
      required: [name, icon]
      properties:
        name:
          type: string
        icon:
          type: string

    CategoryUpdateInput:
      allOf:
        - $ref: '#/components/schemas/CategoryCreateInput'
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid

    CategoryWithExpenses:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          properties:
            expenses:
              type: array
              items:
                type: object
                additionalProperties: true

    Currency:
      type: object
      properties:
        name:
          type: string
        symbol:
          type: string
        factor:
          type: number
          format: float

    CurrencyCreateInput:
      type: object
      required: [name, symbol, factor]
      properties:
        name:
          type: string
        symbol:
          type: string
        factor:
          type: number
          format: float

    CurrencyUpdateInput:
      type: object
      required: [name, symbol, factor]
      properties:
        name:
          type: string
        symbol:
          type: string
        factor:
          type: number
          format: float

    TripIdInput:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
